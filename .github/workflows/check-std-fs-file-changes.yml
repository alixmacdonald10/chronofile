name: Check rust-lang/rust std::fs changes

on:
  schedule:
    - cron: "0 6 * * *" # Runs at 6 AM UTC every day
  workflow_dispatch:
    branches: ["*"]

permissions:
  issues: write
  contents: read

jobs:
  check-file:
    runs-on: ubuntu-latest
    steps:
      - name: Check for fs.rs changes via GitHub API
        id: check
        run: |
          response=$(curl -s "https://api.github.com/repos/rust-lang/rust/commits?path=library/std/src/fs.rs&since=$(date -d '24 hours ago' --iso-8601=seconds)")
          if [ "$(echo "$response" | jq '. | length')" -eq 0 ]; then
            echo "no changes made!"
            echo "file_changed=false" >> $GITHUB_OUTPUT
          else
            echo "changes made!"
            echo "$response" | jq -r '.[].sha' > hashes.txt
            echo "file_changed=true" >> $GITHUB_OUTPUT
            echo "hashes=$(cat hashes.txt)" >> $GITHUB_OUTPUT
          fi
      - name: Checkout this repository
        if: steps.check.outputs.file_changed == 'true'
        uses: actions/checkout@v4
      - name: Create issue for changes
        if: steps.check.outputs.file_changed == 'true'
        uses: JasonEtco/create-an-issue@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HASHES: ${{ steps.check.outputs.hashes }}
          DATE: ${{ github.event.schedule || 'manual run' }}
        with:
          filename: .github/ISSUE_TEMPLATE/fs-changes.md
          update_existing: false
