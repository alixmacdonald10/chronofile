name: Check rust-lang/rust std::fs changes

on:
  schedule:
    - cron: "0 6 * * *" # Runs at 6 AM UTC every day

jobs:
  check-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rust-lang/rust
        uses: actions/checkout@v4
        with:
          repository: rust-lang/rust
          path: rust
          fetch-depth: 0 # Fetch all history

      - name: Check for fs.rs changes
        id: check
        run: |
          cd rust

          # Get short commit hashes of any changes
          HASHES=$(git log --since="yesterday 05:59" --format="%h" -- ./src/lib.rs)
          if [ -z "$HASHES" ]; then
            echo "no changes made!"
            echo "file_changed=false" >> $GITHUB_OUTPUT
          else
            echo "changes made!"
            echo "Commit hashes:"
            echo "$HASHES"
            echo "file_changed=true" >> $GITHUB_OUTPUT
            # Format hashes for multiline output
            {
              echo 'hashes<<EOF'
              echo "$HASHES"
              echo EOF
            } >> $GITHUB_OUTPUT
          fi

      - name: Create issue for changes
        if: steps.check.outputs.file_changed == 'true'
        uses: JasonEtco/create-an-issue@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HASHES: ${{ steps.check.outputs.hashes }}
          DATE: ${{ github.event.schedule || 'manual run' }}
        with:
          filename: .github/ISSUE_TEMPLATE/fs-changes.md
          update_existing: false
